<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>多益核心單字 — 記憶卡</title>

<!-- PWA: 讓網站可以加到手機主畫面、全螢幕顯示 -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2d5fa6">
<meta name="mobile-web-app-capable" content="yes">
<!-- iOS 專用設定 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TOEIC單字打卡">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --border: #e4e2dc;
    --border-soft: #eeede9;
    --text: #1a1a18;
    --text-muted: #6b6a65;
    --text-hint: #9e9d98;
    --accent: #2d5fa6;
    --accent-bg: #edf2fb;
    --accent-text: #1a3d6e;
    --warn-bg: #fff8ed;
    --warn-border: #f0c060;
    --warn-text: #7a4f00;
    --success-bg: #edfaf3;
    --success-text: #0f5c33;
    --tag-bg: #f0efeb;
    --tag-text: #4a4944;
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Layout */
  .app { max-width: 760px; margin: 0 auto; padding: 24px 16px 60px; }
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
  .logo { font-size: 17px; font-weight: 600; letter-spacing: -.02em; }
  .logo span { color: var(--accent); }
  .day-badge { font-size: 12px; background: var(--accent-bg); color: var(--accent-text); padding: 4px 12px; border-radius: 99px; font-weight: 500; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--border-soft); border-radius: 99px; padding: 3px; width: fit-content; }
  .tab { font-size: 13px; font-weight: 500; padding: 6px 18px; border-radius: 99px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; transition: all .15s; }
  .tab.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.08); }

  /* Progress */
  .progress-row { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .pbar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .pbar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .3s ease; }
  .prog-label { font-size: 12px; color: var(--text-hint); min-width: 48px; text-align: right; }

  /* Word dots */
  .dot-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 18px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); cursor: pointer; transition: background .15s; }
  .dot.done { background: #93c4a0; }
  .dot.active { background: var(--accent); transform: scale(1.3); }

  /* Card */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; }
  .word-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 6px; }
  .word { font-size: 28px; font-weight: 700; letter-spacing: -.02em; }
  .pos-pill { font-size: 11px; padding: 3px 10px; border-radius: 99px; background: var(--tag-bg); color: var(--tag-text); font-weight: 500; margin-top: 6px; white-space: nowrap; }
  .phonetic { font-size: 14px; color: var(--text-muted); margin-bottom: 14px; }
  .meaning { font-size: 19px; font-weight: 600; color: var(--text); margin-bottom: 18px; line-height: 1.4; }
  .section-label { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text-hint); margin-bottom: 8px; margin-top: 16px; }
  .col-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .col-pill { font-size: 12px; padding: 4px 11px; border-radius: 99px; border: 1px solid var(--border); color: var(--text-muted); background: var(--bg); }
  .context-box { background: var(--bg); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 13px; color: var(--text-muted); line-height: 1.7; }
  .memory-box { border-left: 3px solid var(--accent); padding: 10px 14px; background: var(--accent-bg); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; font-size: 13px; color: var(--accent-text); line-height: 1.7; }
  .confuse-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .confuse-pill { font-size: 12px; padding: 4px 11px; border-radius: 99px; background: var(--warn-bg); border: 1px solid var(--warn-border); color: var(--warn-text); }
  .example { font-size: 13px; line-height: 1.8; color: var(--text-muted); padding: 8px 0; border-bottom: 1px solid var(--border-soft); }
  .example:last-child { border-bottom: none; }
  .example em { color: var(--accent); font-style: normal; font-weight: 600; }

  /* Nav buttons */
  .nav-row { display: flex; align-items: center; justify-content: space-between; }
  .nav-btn { font-size: 13px; font-weight: 500; padding: 8px 20px; border-radius: 99px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); cursor: pointer; transition: all .15s; }
  .nav-btn:hover { background: var(--bg); border-color: var(--text-muted); }
  .nav-btn:disabled { opacity: .35; cursor: default; }
  .done-btn { font-size: 12px; padding: 6px 14px; border-radius: 99px; border: 1px solid #93c4a0; background: var(--success-bg); color: var(--success-text); cursor: pointer; }
  .done-btn.marked { background: #93c4a0; color: #0f3d20; }

  /* Quiz */
  .quiz-filters { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-btn { font-size: 12px; padding: 4px 12px; border-radius: 99px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .quiz-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 10px; }
  .quiz-meta { font-size: 11px; color: var(--text-hint); margin-bottom: 6px; display: flex; gap: 8px; }
  .quiz-word { font-size: 13px; font-weight: 700; color: var(--accent); }
  .quiz-q { font-size: 14px; font-weight: 500; line-height: 1.6; margin-bottom: 10px; }
  .reveal-btn { font-size: 12px; padding: 5px 14px; border-radius: 99px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; }
  .answer-box { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border-soft); font-size: 13px; color: var(--text-muted); line-height: 1.7; display: none; }
  .answer-box.show { display: block; }
  .answer-box strong { color: var(--success-text); }

  /* Stats bar */
  .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; text-align: center; }
  .stat-num { font-size: 22px; font-weight: 700; }
  .stat-label { font-size: 11px; color: var(--text-hint); margin-top: 2px; }

  /* Search */
  .search-wrap { position: relative; margin-bottom: 14px; }
  .search-wrap input { width: 100%; padding: 9px 14px 9px 36px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); font-size: 13px; color: var(--text); outline: none; }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-hint); font-size: 15px; }

  .pane { display: none; }
  .pane.active { display: block; }

  @media (max-width: 480px) {
    .word { font-size: 22px; }
    .meaning { font-size: 16px; }
    .stats-bar { grid-template-columns: repeat(3,1fr); }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">TOEIC <span>單字卡</span></div>
    <div class="day-badge" id="day-badge">Day 1 — 第 1–20 個</div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('vocab',this)">單字學習</button>
    <button class="tab" onclick="switchTab('quiz',this)">複習測驗</button>
    <button class="tab" onclick="switchTab('list',this)">單字列表</button>
  </div>

  <!-- VOCAB PANE -->
  <div class="pane active" id="pane-vocab">
    <div class="progress-row">
      <div class="pbar"><div class="pbar-fill" id="pbar"></div></div>
      <div class="prog-label" id="prog-label">1 / 20</div>
    </div>
    <div class="dot-row" id="dot-row"></div>
    <div id="card-area"></div>
    <div class="nav-row">
      <button class="nav-btn" id="btn-prev" onclick="move(-1)">← 上一個</button>
      <button class="done-btn" id="btn-done" onclick="toggleDone()">記住了</button>
      <button class="nav-btn" id="btn-next" onclick="move(1)">下一個 →</button>
    </div>
  </div>

  <!-- QUIZ PANE -->
  <div class="pane" id="pane-quiz">
    <div class="stats-bar">
      <div class="stat"><div class="stat-num" id="st-total">60</div><div class="stat-label">題目總數</div></div>
      <div class="stat"><div class="stat-num" id="st-done">0</div><div class="stat-label">已作答</div></div>
      <div class="stat"><div class="stat-num" id="st-left">60</div><div class="stat-label">待複習</div></div>
    </div>
    <div class="quiz-filters">
      <button class="filter-btn active" onclick="setFilter('all',this)">全部</button>
      <button class="filter-btn" onclick="setFilter('day1',this)">第 1 天</button>
      <button class="filter-btn" onclick="setFilter('day3',this)">第 3 天</button>
      <button class="filter-btn" onclick="setFilter('day7',this)">第 7 天</button>
    </div>
    <div id="quiz-area"></div>
  </div>

  <!-- LIST PANE -->
  <div class="pane" id="pane-list">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="搜尋單字或中文意思…" oninput="filterList(this.value)">
    </div>
    <div id="list-area"></div>
  </div>
</div>

<script>
const words = [
  {
    word:"allocate", phonetic:"/ˈæləkeɪt/", pos:"動詞",
    meaning:"分配、撥出（資源、預算、時間）",
    collocations:["allocate budget","allocate resources","allocate time","allocate funds"],
    context:"公司在討論預算或人力分配時最常出現。例如主管說「我們需要把更多資源分配到行銷部門」。",
    memory:"allo（all 全部）+ locate（定位）→ 把所有東西定位到對的地方 = 分配",
    confuse:["distribute（廣泛散發）","assign（指定給個人）"],
    examples:[
      "We need to <em>allocate</em> more funds to the R&D department this quarter.",
      "The manager <em>allocated</em> three hours for the team meeting.",
      "The budget was <em>allocated</em> across five different projects."
    ],
    quiz:[
      {day:"第 1 天",q:"\"We need to ___ more resources to customer support.\" 填入正確動詞。",a:"allocate。句意：我們需要分配更多資源給客服部門。"},
      {day:"第 3 天",q:"allocate、distribute、assign 三者有何不同？請用中文說明。",a:"allocate = 撥出預算/資源給某部門；distribute = 廣泛散發給多人；assign = 指定任務給特定個人。"},
      {day:"第 7 天",q:"翻譯：「董事會決定將 20% 預算撥給新產品開發。」",a:"The board decided to allocate 20% of the budget to new product development."}
    ]
  },
  {
    word:"initiative", phonetic:"/ɪˈnɪʃətɪv/", pos:"名詞",
    meaning:"主動性；新方案、新計畫",
    collocations:["take the initiative","launch an initiative","strategic initiative","on one's own initiative"],
    context:"面試或績效評估常見：「她總是主動提出解決方案。」也指公司推動的新專案計畫。",
    memory:"initial（開始）+ ive → 主動跨出第一步的精神 = 主動性",
    confuse:["motivation（動機）","incentive（獎勵誘因）"],
    examples:[
      "She took the <em>initiative</em> to reorganize the filing system.",
      "The company launched a new sustainability <em>initiative</em> last month.",
      "Employees are encouraged to act on their own <em>initiative</em>."
    ],
    quiz:[
      {day:"第 1 天",q:"\"She always takes the ___ to solve problems.\" 填入正確名詞。",a:"initiative。take the initiative = 主動出擊。"},
      {day:"第 3 天",q:"initiative 作為「主動性」和「新計畫」時，各舉一個例句情境。",a:"主動性：He showed great initiative. 新計畫：We launched a cost-cutting initiative."},
      {day:"第 7 天",q:"翻譯：「這項永續發展計畫是由執行長親自發起的。」",a:"The sustainability initiative was launched by the CEO personally."}
    ]
  },
  {
    word:"comply", phonetic:"/kəmˈplaɪ/", pos:"動詞",
    meaning:"遵守、符合（規定、法規）",
    collocations:["comply with regulations","comply with guidelines","comply with requirements","failure to comply"],
    context:"法律、合規場合必備詞。\"All vendors must comply with our safety standards.\"",
    memory:"com（一起）+ ply（折疊/順從）→ 跟著規定一起彎折 = 遵守",
    confuse:["conform（符合標準/風格）","adhere to（堅守原則）"],
    examples:[
      "All suppliers must <em>comply</em> with our environmental regulations.",
      "Failure to <em>comply</em> may result in contract termination.",
      "The new policy requires all staff to <em>comply</em> with data protection rules."
    ],
    quiz:[
      {day:"第 1 天",q:"\"All employees must ___ with the company's code of conduct.\" 填入正確動詞。",a:"comply。comply with = 遵守…（固定搭配，不可省略 with）。"},
      {day:"第 3 天",q:"comply with / conform to / adhere to 三者語氣有何差異？",a:"comply with 較正式，常用於法規；conform to 著重在符合標準或規範；adhere to 語氣最強，強調堅守原則。"},
      {day:"第 7 天",q:"翻譯：「未能遵守這些安全規定可能導致罰款。」",a:"Failure to comply with these safety regulations may result in a fine."}
    ]
  },
  {
    word:"streamline", phonetic:"/ˈstriːmlaɪn/", pos:"動詞",
    meaning:"精簡流程、提升效率",
    collocations:["streamline operations","streamline processes","streamline workflow","streamline procedures"],
    context:"商業報告、管理會議常見。公司在談論提效降本時幾乎必用此字。",
    memory:"stream（水流）+ line → 讓工作像河流般順暢流動 = 精簡流程",
    confuse:["simplify（簡化，著重去除複雜性）","optimize（最佳化，著重效果最大化）"],
    examples:[
      "We need to <em>streamline</em> our approval process to save time.",
      "The new software helped <em>streamline</em> inventory management.",
      "The merger was intended to <em>streamline</em> operations across both companies."
    ],
    quiz:[
      {day:"第 1 天",q:"\"The goal is to ___ our supply chain and reduce costs.\" 填入正確動詞。",a:"streamline。意指精簡供應鏈流程以降低成本。"},
      {day:"第 3 天",q:"streamline 和 simplify 有何不同？",a:"streamline 著重讓流程更順暢有效率（速度感）；simplify 著重去除複雜性（結構感）。"},
      {day:"第 7 天",q:"翻譯：「公司引進新系統以精簡採購流程。」",a:"The company introduced a new system to streamline the procurement process."}
    ]
  },
  {
    word:"negotiate", phonetic:"/nɪˈɡoʊʃieɪt/", pos:"動詞",
    meaning:"協商、談判",
    collocations:["negotiate a contract","negotiate terms","negotiate a deal","negotiate a price"],
    context:"採購、業務、法律部門日常詞彙。多益閱讀題和對話題均高頻出現。",
    memory:"neg（否定）+ otiate（去工作）→ 雙方都不直接接受，要來回談 = 協商",
    confuse:["discuss（一般討論，無對立含意）","mediate（第三方調解）"],
    examples:[
      "Our team spent two weeks <em>negotiating</em> the contract terms.",
      "She was able to <em>negotiate</em> a 15% discount with the supplier.",
      "Both parties agreed to <em>negotiate</em> the delivery schedule."
    ],
    quiz:[
      {day:"第 1 天",q:"\"We will ___ the terms of the agreement next week.\" 填入正確動詞。",a:"negotiate。negotiate the terms = 協商條款（固定搭配）。"},
      {day:"第 3 天",q:"negotiate 後面通常接什麼名詞？請列出三個常見搭配。",a:"negotiate a contract / negotiate terms / negotiate a deal / negotiate a price。"},
      {day:"第 7 天",q:"翻譯：「業務代表成功與供應商談判出更優惠的付款條件。」",a:"The sales representative successfully negotiated better payment terms with the supplier."}
    ]
  },
  {
    word:"revenue", phonetic:"/ˈrevənjuː/", pos:"名詞",
    meaning:"營收、收入（公司整體進帳）",
    collocations:["generate revenue","total revenue","revenue growth","revenue stream","annual revenue"],
    context:"財務報告、季度會議核心詞。與 profit（利潤）是多益最常測試的混淆組。",
    memory:"re（回來）+ venue（來的地方）→ 錢回流進來的地方 = 營收",
    confuse:["profit（扣除成本後的利潤）","income（個人或公司所得）","turnover（英式，總營業額）"],
    examples:[
      "The company's annual <em>revenue</em> increased by 12% last year.",
      "This new product line is expected to generate significant <em>revenue</em>.",
      "A drop in <em>revenue</em> forced the company to cut staff."
    ],
    quiz:[
      {day:"第 1 天",q:"\"The firm reported a 20% increase in annual ___.\" 填入正確名詞。",a:"revenue。annual revenue = 年營收，是財務報告常見搭配。"},
      {day:"第 3 天",q:"revenue、profit、income 三者的差異是什麼？",a:"revenue = 賣出產品/服務的總進帳（未扣成本）；profit = 扣掉所有成本後的利潤；income = 較廣義，可指個人或公司的所得。"},
      {day:"第 7 天",q:"翻譯：「公司預計今年第四季營收將達到破紀錄的高點。」",a:"The company expects its revenue to reach a record high in Q4 this year."}
    ]
  },
  {
    word:"subsequent", phonetic:"/ˈsʌbsɪkwənt/", pos:"形容詞",
    meaning:"隨後的、之後發生的",
    collocations:["subsequent meeting","subsequent analysis","subsequent steps","in subsequent months"],
    context:"商務報告、會議紀錄常見，用來指「接下來的步驟」或「後續的討論」。",
    memory:"sub（在下面）+ sequent（順序）→ 排在順序下面的 = 隨後的",
    confuse:["following（較口語，同義）","consequent（因果關係造成的結果）"],
    examples:[
      "The initial meeting was held in March, with <em>subsequent</em> discussions in April.",
      "Any <em>subsequent</em> changes to the contract must be approved in writing.",
      "The pilot program was successful, leading to a <em>subsequent</em> nationwide rollout."
    ],
    quiz:[
      {day:"第 1 天",q:"\"The first draft was submitted in May; ___ revisions were made in June.\" 填入正確形容詞。",a:"subsequent。意指五月提交初稿，六月進行後續修改。"},
      {day:"第 3 天",q:"subsequent 和 consequent 有何不同？",a:"subsequent 僅指時間上的先後順序（之後）；consequent 強調因果關係（因此而導致的）。"},
      {day:"第 7 天",q:"翻譯：「初次會議後，後續的談判持續了三個月。」",a:"After the initial meeting, subsequent negotiations lasted for three months."}
    ]
  },
  {
    word:"reimburse", phonetic:"/ˌriːɪmˈbɜːrs/", pos:"動詞",
    meaning:"報銷、退還費用給某人",
    collocations:["reimburse expenses","reimburse costs","reimburse employees","be fully reimbursed"],
    context:"HR、出差報銷場景必備詞。\"Please submit your receipts to be reimbursed.\"",
    memory:"re（再次）+ im（進入）+ burse（錢包）→ 把錢再放回你的錢包 = 報銷退款",
    confuse:["refund（退給消費者的錢）","compensate（賠償損失）"],
    examples:[
      "Employees will be <em>reimbursed</em> for all travel-related expenses.",
      "Please keep your receipts so we can <em>reimburse</em> you promptly.",
      "The company <em>reimbursed</em> her for the conference registration fee."
    ],
    quiz:[
      {day:"第 1 天",q:"\"Submit your receipts within 30 days to be ___.\" 填入正確動詞形式。",a:"reimbursed（被動式）。意指 30 天內提交收據以獲得報銷。"},
      {day:"第 3 天",q:"reimburse 和 refund 使用情境有何不同？",a:"reimburse 是公司退還員工墊付的費用（出差/報銷）；refund 是商家退還消費者付款（退貨/取消訂單）。"},
      {day:"第 7 天",q:"翻譯：「所有出差費用將在提交報告後兩週內報銷。」",a:"All travel expenses will be reimbursed within two weeks of submitting the report."}
    ]

let cur = 0;
let done = new Set();
let quizFilter = 'all';
let revealedQuiz = new Set();

function renderDots() {
  document.getElementById('dot-row').innerHTML = words.map((_, i) =>
    `<div class="dot${i===cur?' active':''} ${done.has(i)?'done':''}" onclick="goTo(${i})" title="${words[i].word}"></div>`
  ).join('');
}

function renderCard() {
  const w = words[cur];
  const total = words.length;
  document.getElementById('pbar').style.width = ((cur+1)/total*100)+'%';
  document.getElementById('prog-label').textContent = `${cur+1} / ${total}`;
  document.getElementById('btn-prev').disabled = cur === 0;
  document.getElementById('btn-next').disabled = cur === total-1;
  const doneBtn = document.getElementById('btn-done');
  doneBtn.textContent = done.has(cur) ? '已記住 ✓' : '記住了';
  doneBtn.className = 'done-btn' + (done.has(cur) ? ' marked' : '');

  document.getElementById('card-area').innerHTML = `
    <div class="card">
      <div class="word-header">
        <div>
          <div class="word">${w.word}</div>
          <div class="phonetic">${w.phonetic}</div>
        </div>
        <span class="pos-pill">${w.pos}</span>
      </div>
      <div class="meaning">${w.meaning}</div>
      <div class="section-label">常見搭配詞</div>
      <div class="col-row">${w.collocations.map(c=>`<span class="col-pill">${c}</span>`).join('')}</div>
      <div class="section-label">母語人士使用情境</div>
      <div class="context-box">${w.context}</div>
      <div class="section-label">記憶聯想法</div>
      <div class="memory-box">${w.memory}</div>
      <div class="section-label">容易混淆的字</div>
      <div class="confuse-row">${w.confuse.map(c=>`<span class="confuse-pill">${c}</span>`).join('')}</div>
      <div class="section-label">例句</div>
      ${w.examples.map(e=>`<div class="example">${e}</div>`).join('')}
    </div>
  `;
  renderDots();
}

function move(dir) {
  cur = Math.max(0, Math.min(words.length-1, cur+dir));
  renderCard();
  window.scrollTo({top:0, behavior:'smooth'});
}
function goTo(i) { cur = i; renderCard(); }
function toggleDone() {
  if (done.has(cur)) done.delete(cur); else done.add(cur);
  renderCard();
  updateStats();
}

function updateStats() {
  const total = words.length * 3;
  const revealed = revealedQuiz.size;
  document.getElementById('st-total').textContent = total;
  document.getElementById('st-done').textContent = revealed;
  document.getElementById('st-left').textContent = total - revealed;
}

function setFilter(f, btn) {
  quizFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderQuiz();
}

function renderQuiz() {
  const dayMap = {'day1':'第 1 天','day3':'第 3 天','day7':'第 7 天'};
  let html = '';
  words.forEach((w, wi) => {
    w.quiz.forEach((q, qi) => {
      if (quizFilter !== 'all' && q.day !== dayMap[quizFilter]) return;
      const key = `${wi}-${qi}`;
      html += `<div class="quiz-card">
        <div class="quiz-meta">
          <span class="quiz-word">${w.word}</span>
          <span>${q.day}</span>
        </div>
        <div class="quiz-q">${q.q}</div>
        <button class="reveal-btn" onclick="revealAnswer('${key}')">查看答案</button>
        <div class="answer-box${revealedQuiz.has(key)?' show':''}" id="ans-${key}">
          <strong>答：</strong>${q.a}
        </div>
      </div>`;
    });
  });
  document.getElementById('quiz-area').innerHTML = html || '<p style="color:var(--text-hint);font-size:13px;padding:12px 0;">此篩選條件無題目。</p>';
}

function revealAnswer(key) {
  revealedQuiz.add(key);
  const el = document.getElementById('ans-'+key);
  if (el) el.classList.add('show');
  updateStats();
}

function renderList() {
  document.getElementById('list-area').innerHTML = words.map((w,i) => `
    <div class="quiz-card" style="cursor:pointer" onclick="goToVocab(${i})">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div>
          <span style="font-size:16px;font-weight:600;color:var(--accent)">${w.word}</span>
          <span class="pos-pill" style="margin-left:8px">${w.pos}</span>
          ${done.has(i)?'<span style="font-size:11px;color:var(--success-text);margin-left:8px">✓ 已記住</span>':''}
        </div>
        <span style="font-size:11px;color:var(--text-hint)">${w.phonetic}</span>
      </div>
      <div style="font-size:13px;color:var(--text-muted);margin-top:5px">${w.meaning}</div>
    </div>
  `).join('');
}

function filterList(q) {
  const kw = q.toLowerCase();
  document.querySelectorAll('#list-area .quiz-card').forEach((el, i) => {
    const w = words[i];
    const match = w.word.toLowerCase().includes(kw) || w.meaning.includes(kw);
    el.style.display = match ? '' : 'none';
  });
}

function goToVocab(i) {
  cur = i;
  switchTab('vocab', document.querySelector('.tab'));
  renderCard();
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
  document.querySelector(`button[onclick*="${name}"]`).classList.add('active');
  document.getElementById('pane-'+name).classList.add('active');
  if (name === 'quiz') { renderQuiz(); updateStats(); }
  if (name === 'list') renderList();
}

renderCard();
updateStats();

// PWA: 註冊 service worker，啟用離線快取
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  });
}
</script>
</body>
</html>
